# Math 119 — Spring 2026 Schedule Configuration
#
# HOW TO EDIT:
#   - To slow down: insert a session twice, or insert "flex-N" / "review" / "project"
#   - To skip a class: add the date to holidays
#   - Sessions are assigned to MTRF dates in order, skipping holidays
#   - Run: uv run python tools/generate_schedule.py  to regenerate site/_today.qmd

semester:
  start: "2026-04-20"
  end:   "2026-07-22"
  class_days: [Mon, Tue, Thu, Fri]  # MTRF

holidays:
  - date: "2026-05-25"
    name: "Memorial Day"
  - date: "2026-06-19"
    name: "Juneteenth"
  - date: "2026-07-03"
    name: "Independence Day"

# Sessions in order — one entry per class meeting.
# Each entry is either:
#   class-N     → links to site/class/class-N.qmd
#   flex-N      → links to site/flex/flex-N.qmd
#   review      → no link, shows "Review Day"
#   project     → no link, shows "Project Work Day"
#   testing     → no link, shows "Testing Day"
#   holiday     → skip this slot (alternative to adding to holidays above)
#
# Edit this list to adjust pacing. The script handles the date math.

